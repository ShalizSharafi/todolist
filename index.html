<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="stylesheet" href="stylesheet/out.css">
       <title>ToDoList</title>
</head>
<body>
       <section class="w-full p-5 flex items-center justify-center bg-[#1A1A19] min-h-screen ">
              <div class="todolist w-full md:w-1/2 p-5  flex-wrap flex  rounded-[5px] bg-white gap-2.5 shadow-[2px_2px_2px] shadow-white/10 relative">
                     <div class="row gap-2.5">
                            <h1>To-Do list</h1>
                            <div class="row gap-2.5">
                                   <span class="circles bg-brand-blue"></span>
                                   <span class="circles  bg-swatch-orange"></span>
                                   <span class="circles  bg-swatch-teal"></span>
                                   <span class="circles bg-swatch-orange-light"></span>
                                   <span class="circles bg-brand-purple"></span>
                            </div>
                     </div>
                     <!-- //add task -->
                     <div class="row justify-between items-center gap-2.5 mt-2.5">
                            <input type="text" class="inpTop" id="inp" placeholder="add a new task ..." >
                            <button class="addBtn">+ add</button>
                     </div>
                     <!-- //task nav -->
                     <nav class="taskNav row items-center justify-center md:justify-start  ">
                            <ul class="w-full  px-4 py-2 rounded-[5px] flex justify-evenly md:gap-5 items-center bg-[#1A1A19]">
                                   <li class="navItem" data-filter="all">All</li>
                                   <li class="navItem" data-filter="active">Active</li>
                                   <li class="navItem" data-filter="completed">Completed</li>
                            </ul>
                     </nav>

                     <div class="row gap-2.5 mb-5">
                                   <div class="date bg-brand-blue">
                                          <h3></h3>
                                   </div>
                                   <div class="time date bg-brand-purple">
                                          <h3></h3>
                                   </div>
                     </div>

                     <!-- task wall -->

                    <div class="row h-[50vh] overflow-scroll p-1 ">
                     <div class="taskWall row gap-2.5 content-start">
                   <!-- create element -->

                    </div>
                    </div>
                     

                    <div class="delete hidden absolute bottom-0 left-0 py-1.5 px-5 bg-text-body/25 backdrop-blur-2xl w-full justify-between z-10">
                     <span></span>
                     <h3>Task deleted permenantly</h3>
                     <span class="undo">Undo</span>
                    </div>
              </div>

       </section>
</body>
<script src="js/script.js"></script>
</html>
